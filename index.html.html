<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Kalorien"/>
<title>Kalorienzähler</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #eeede8;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --border: rgba(0,0,0,0.12);
    --border-med: rgba(0,0,0,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --blue: #378ADD;
    --red: #E24B4A;
    --amber: #EF9F27;
    --green: #1D9E75;
    --purple: #7F77DD;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #2a2a27;
      --bg-tertiary: #333330;
      --text-primary: #f0efe8;
      --text-secondary: #9a9a94;
      --border: rgba(255,255,255,0.1);
      --border-med: rgba(255,255,255,0.2);
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg-primary);
    min-height: 100vh;
  }
  .tab-bar {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg-primary);
    position: sticky;
    top: 0;
    z-index: 100;
    padding-top: env(safe-area-inset-top);
  }
  .tab-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: none;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    font-family: var(--font);
  }
  .tab-btn.active {
    color: var(--text-primary);
    border-bottom-color: var(--text-primary);
    font-weight: 500;
  }
  .view { display: none; padding: 1.25rem 1rem 2rem; }
  .view.active { display: block; }

  .day-header { font-size: 22px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .day-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 1.5rem; }

  .macro-ring-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .macro-labels { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .macro-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .macro-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .macro-name { color: var(--text-secondary); flex: 1; }
  .macro-val { font-weight: 500; color: var(--text-primary); }

  .meal-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .meal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 14px;
  }
  .meal-name { font-size: 14px; font-weight: 500; }
  .meal-kcal { font-size: 13px; color: var(--text-secondary); }
  .meal-items { border-top: 0.5px solid var(--border); }
  .meal-item { padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
  .meal-item + .meal-item { border-top: 0.5px solid var(--border); }
  .item-name { font-size: 13px; flex: 1; }
  .item-qty { font-size: 12px; color: var(--text-secondary); }
  .item-kcal { font-size: 13px; font-weight: 500; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-secondary); font-size: 18px;
    padding: 0 0 0 6px; line-height: 1;
    font-family: var(--font);
  }
  .add-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; border: none; background: none;
    cursor: pointer; color: var(--text-secondary);
    font-size: 13px; width: 100%;
    font-family: var(--font);
  }
  .add-btn:active { background: var(--bg-secondary); }

  .scan-area {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1.25rem;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #video-wrap { width: 100%; position: relative; display: none; }
  #video { width: 100%; display: block; max-height: 260px; object-fit: cover; }
  .scan-frame {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 90px;
    border: 2px solid var(--blue);
    border-radius: 8px; pointer-events: none;
  }
  .scan-placeholder { padding: 2.5rem 1rem; text-align: center; color: var(--text-secondary); }
  .scan-icon { font-size: 44px; display: block; margin-bottom: 10px; }

  .cam-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; width: 100%; padding: 13px;
    background: none; border: 0.5px solid var(--border-med);
    border-radius: var(--radius-md); font-size: 14px;
    cursor: pointer; color: var(--text-primary);
    margin-bottom: 1.25rem; font-family: var(--font);
    transition: background 0.15s;
  }
  .cam-btn:active { background: var(--bg-secondary); }

  .input-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; display: block; }
  .barcode-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .barcode-row input {
    flex: 1; padding: 11px 12px;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-md);
    font-size: 15px; background: var(--bg-primary);
    color: var(--text-primary); font-family: var(--font);
    outline: none;
  }
  .barcode-row input:focus { border-color: var(--blue); }
  .barcode-row button {
    padding: 11px 16px;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-md);
    background: none; font-size: 14px;
    cursor: pointer; color: var(--text-primary);
    font-family: var(--font); white-space: nowrap;
  }
  .barcode-row button:active { background: var(--bg-secondary); }

  .status-msg { font-size: 13px; color: var(--text-secondary); padding: 1rem 0; text-align: center; }
  .error-msg { color: var(--red); }
  .success-msg { color: var(--green); }

  .product-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .product-name { font-size: 16px; font-weight: 500; margin-bottom: 3px; }
  .product-brand { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
  .nutr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .nutr-cell {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 9px 10px;
  }
  .nutr-cell-label { font-size: 11px; color: var(--text-secondary); }
  .nutr-cell-val { font-size: 15px; font-weight: 500; margin-top: 2px; }
  .nutr-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  .qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .qty-row label { font-size: 13px; color: var(--text-secondary); }
  .qty-row input {
    width: 80px; padding: 8px 10px;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-md);
    font-size: 15px; background: var(--bg-primary);
    color: var(--text-primary); font-family: var(--font);
    outline: none;
  }
  .qty-row input:focus { border-color: var(--blue); }
  .qty-row span { font-size: 13px; color: var(--text-secondary); }

  .meal-select-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .meal-select-row label { font-size: 13px; color: var(--text-secondary); }
  .meal-select-row select {
    padding: 8px 10px;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-md);
    font-size: 14px; background: var(--bg-primary);
    color: var(--text-primary); font-family: var(--font);
    outline: none;
  }

  .add-entry-btn {
    width: 100%; padding: 13px;
    background: var(--text-primary);
    color: var(--bg-primary);
    border: none; border-radius: var(--radius-md);
    font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: var(--font);
    transition: opacity 0.15s;
  }
  .add-entry-btn:active { opacity: 0.8; }

  .history-day { margin-bottom: 1.75rem; }
  .history-day-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 14px;
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md); margin-bottom: 6px;
  }
  .history-item-name { font-size: 13px; margin-bottom: 2px; }
  .history-item-meal { font-size: 11px; color: var(--text-secondary); }
  .history-item-kcal { font-size: 14px; font-weight: 500; text-align: right; }
  .history-item-detail { font-size: 11px; color: var(--text-secondary); text-align: right; margin-top: 2px; }
  .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-secondary); font-size: 14px; }

  #quagga-canvas { display: none; }
</style>
</head>
<body>
<div id="app">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('today')">Heute</button>
    <button class="tab-btn" onclick="switchTab('scan')">Scannen</button>
    <button class="tab-btn" onclick="switchTab('history')">Verlauf</button>
  </div>

  <!-- HEUTE -->
  <div id="view-today" class="view active">
    <div class="day-header" id="today-date"></div>
    <div class="day-sub" id="today-sub"></div>
    <div class="macro-ring-wrap">
      <svg width="90" height="90" viewBox="0 0 90 90" style="flex-shrink:0">
        <circle cx="45" cy="45" r="36" fill="none" stroke="var(--border)" stroke-width="9"/>
        <circle id="ring-kcal" cx="45" cy="45" r="36" fill="none" stroke="var(--blue)" stroke-width="9"
          stroke-dasharray="226" stroke-dashoffset="226" stroke-linecap="round"
          transform="rotate(-90 45 45)" style="transition:stroke-dashoffset 0.5s;"/>
        <text x="45" y="41" text-anchor="middle" font-size="17" font-weight="500" fill="var(--text-primary)" font-family="-apple-system,sans-serif" id="ring-num">0</text>
        <text x="45" y="55" text-anchor="middle" font-size="10" fill="var(--text-secondary)" font-family="-apple-system,sans-serif">kcal</text>
      </svg>
      <div class="macro-labels">
        <div class="macro-row">
          <div class="macro-dot" style="background:var(--red)"></div>
          <span class="macro-name">Protein</span>
          <span class="macro-val" id="m-protein">0 g</span>
        </div>
        <div class="macro-row">
          <div class="macro-dot" style="background:var(--amber)"></div>
          <span class="macro-name">Kohlenhydrate</span>
          <span class="macro-val" id="m-carbs">0 g</span>
        </div>
        <div class="macro-row">
          <div class="macro-dot" style="background:var(--green)"></div>
          <span class="macro-name">Fett</span>
          <span class="macro-val" id="m-fat">0 g</span>
        </div>
        <div class="macro-row">
          <div class="macro-dot" style="background:var(--purple)"></div>
          <span class="macro-name">Ballaststoffe</span>
          <span class="macro-val" id="m-fiber">0 g</span>
        </div>
      </div>
    </div>
    <div id="meals-container"></div>
  </div>

  <!-- SCANNEN -->
  <div id="view-scan" class="view">
    <div class="scan-area">
      <div id="scan-placeholder" class="scan-placeholder">
        <span class="scan-icon">&#9638;</span>
        Kamera aktivieren um<br/>Barcode zu scannen
      </div>
      <div id="video-wrap">
        <video id="video" autoplay muted playsinline></video>
        <div class="scan-frame"></div>
      </div>
    </div>
    <button class="cam-btn" id="cam-btn" onclick="toggleCamera()">
      <span id="cam-icon">&#9654;</span>
      <span id="cam-label">Kamera starten</span>
    </button>
    <label class="input-label">Oder Barcode manuell eingeben:</label>
    <div class="barcode-row">
      <input type="text" id="barcode-input" placeholder="z. B. 4006040105226" inputmode="numeric"/>
      <button onclick="lookupBarcode()">Suchen</button>
    </div>
    <div id="scan-status"></div>
    <div id="product-result"></div>
  </div>

  <!-- VERLAUF -->
  <div id="view-history" class="view">
    <div id="history-container"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
const GOAL_KCAL = 2000;
const MEALS = ['Frühstück','Mittagessen','Abendessen','Snack'];
let entries = JSON.parse(localStorage.getItem('kal_v1') || '[]');
let currentProduct = null;
let cameraRunning = false;

function today() { return new Date().toISOString().slice(0,10); }
function fmt(n, d=1) { return (Math.round(n * Math.pow(10,d)) / Math.pow(10,d)).toFixed(d); }
function todayEntries() { return entries.filter(e => e.date === today()); }
function save() { localStorage.setItem('kal_v1', JSON.stringify(entries)); }

function switchTab(t) {
  ['today','scan','history'].forEach((id,i) => {
    document.getElementById('view-'+id).classList.toggle('active', id===t);
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active', id===t);
  });
  if (t==='today') renderToday();
  if (t==='history') renderHistory();
  if (t!=='scan' && cameraRunning) stopCamera();
}

function renderToday() {
  const d = new Date();
  document.getElementById('today-date').textContent = d.toLocaleDateString('de-DE', {weekday:'long',day:'numeric',month:'long'});
  const te = todayEntries();
  const tot = { kcal:0, protein:0, carbs:0, fat:0, fiber:0 };
  te.forEach(e => { tot.kcal+=e.kcal; tot.protein+=e.protein; tot.carbs+=e.carbs; tot.fat+=e.fat; tot.fiber+=(e.fiber||0); });
  document.getElementById('today-sub').textContent = Math.round(tot.kcal) + ' / ' + GOAL_KCAL + ' kcal gegessen';
  document.getElementById('ring-num').textContent = Math.round(tot.kcal);
  document.getElementById('m-protein').textContent = fmt(tot.protein) + ' g';
  document.getElementById('m-carbs').textContent = fmt(tot.carbs) + ' g';
  document.getElementById('m-fat').textContent = fmt(tot.fat) + ' g';
  document.getElementById('m-fiber').textContent = fmt(tot.fiber) + ' g';
  const pct = Math.min(tot.kcal / GOAL_KCAL, 1);
  document.getElementById('ring-kcal').setAttribute('stroke-dashoffset', (226 * (1 - pct)).toFixed(2));

  const container = document.getElementById('meals-container');
  container.innerHTML = '';
  MEALS.forEach(meal => {
    const items = te.filter(e => e.meal === meal);
    const mKcal = items.reduce((s,e)=>s+e.kcal, 0);
    const card = document.createElement('div');
    card.className = 'meal-card';
    const itemsHtml = items.map(e => `
      <div class="meal-item">
        <span class="item-name">${e.name}</span>
        <span class="item-qty">${e.qty}g</span>
        <span class="item-kcal">${Math.round(e.kcal)} kcal</span>
        <button class="del-btn" onclick="deleteEntry('${e.id}')">×</button>
      </div>`).join('');
    card.innerHTML = `
      <div class="meal-header">
        <span class="meal-name">${meal}</span>
        <span class="meal-kcal">${Math.round(mKcal)} kcal</span>
      </div>
      <div class="meal-items">${itemsHtml}</div>
      <button class="add-btn" onclick="switchTab('scan')">+ Produkt hinzufügen</button>`;
    container.appendChild(card);
  });
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save(); renderToday();
}

function renderHistory() {
  const container = document.getElementById('history-container');
  if (!entries.length) { container.innerHTML = '<div class="empty-state">Noch keine Einträge vorhanden.</div>'; return; }
  const byDate = {};
  entries.forEach(e => { if (!byDate[e.date]) byDate[e.date]=[]; byDate[e.date].push(e); });
  const dates = Object.keys(byDate).sort().reverse();
  container.innerHTML = dates.map(d => {
    const es = byDate[d];
    const totalKcal = es.reduce((s,e)=>s+e.kcal,0);
    const label = new Date(d).toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    return `<div class="history-day">
      <div class="history-day-label">${label} — ${Math.round(totalKcal)} kcal</div>
      ${es.map(e=>`
        <div class="history-item">
          <div>
            <div class="history-item-name">${e.name}</div>
            <div class="history-item-meal">${e.meal} · ${e.qty} g</div>
          </div>
          <div>
            <div class="history-item-kcal">${Math.round(e.kcal)} kcal</div>
            <div class="history-item-detail">E ${fmt(e.protein)}g · K ${fmt(e.carbs)}g · F ${fmt(e.fat)}g</div>
          </div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

async function lookupBarcode(code) {
  const bc = code || document.getElementById('barcode-input').value.trim();
  if (!bc) return;
  const status = document.getElementById('scan-status');
  const result = document.getElementById('product-result');
  status.innerHTML = '<div class="status-msg">Produkt wird gesucht…</div>';
  result.innerHTML = '';
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${bc}.json`);
    const data = await res.json();
    if (data.status !== 1) {
      status.innerHTML = '<div class="status-msg error-msg">Produkt nicht gefunden. Anderen Barcode versuchen.</div>';
      return;
    }
    const p = data.product;
    const n = p.nutriments || {};
    currentProduct = {
      name: p.product_name_de || p.product_name || 'Unbekanntes Produkt',
      brand: p.brands || '',
      kcal100: Math.round(n['energy-kcal_100g'] || (n['energy_100g'] ? n['energy_100g']/4.184 : 0)),
      protein100: n.proteins_100g || 0,
      carbs100: n.carbohydrates_100g || 0,
      fat100: n.fat_100g || 0,
      fiber100: n.fiber_100g || 0,
      sugars100: n.sugars_100g || 0,
      saturated100: n['saturated-fat_100g'] || 0,
      salt100: n.salt_100g || 0,
    };
    status.innerHTML = '';
    renderProduct();
  } catch(e) {
    status.innerHTML = '<div class="status-msg error-msg">Netzwerkfehler. Bitte Internetverbindung prüfen.</div>';
  }
}

function renderProduct() {
  const p = currentProduct;
  document.getElementById('product-result').innerHTML = `
    <div class="product-card">
      <div class="product-name">${p.name}</div>
      <div class="product-brand">${p.brand}</div>
      <div class="nutr-grid">
        <div class="nutr-cell">
          <div class="nutr-cell-label">Kalorien</div>
          <div class="nutr-cell-val" id="dyn-kcal">${p.kcal100} kcal</div>
          <div class="nutr-sub">pro 100 g</div>
        </div>
        <div class="nutr-cell">
          <div class="nutr-cell-label">Protein</div>
          <div class="nutr-cell-val" id="dyn-protein">${fmt(p.protein100)} g</div>
          <div class="nutr-sub">pro 100 g</div>
        </div>
        <div class="nutr-cell">
          <div class="nutr-cell-label">Kohlenhydrate</div>
          <div class="nutr-cell-val" id="dyn-carbs">${fmt(p.carbs100)} g</div>
          <div class="nutr-sub">Zucker: ${fmt(p.sugars100)} g</div>
        </div>
        <div class="nutr-cell">
          <div class="nutr-cell-label">Fett</div>
          <div class="nutr-cell-val" id="dyn-fat">${fmt(p.fat100)} g</div>
          <div class="nutr-sub">gesättigt: ${fmt(p.saturated100)} g</div>
        </div>
        <div class="nutr-cell">
          <div class="nutr-cell-label">Ballaststoffe</div>
          <div class="nutr-cell-val" id="dyn-fiber">${fmt(p.fiber100)} g</div>
          <div class="nutr-sub">pro 100 g</div>
        </div>
        <div class="nutr-cell">
          <div class="nutr-cell-label">Salz</div>
          <div class="nutr-cell-val" id="dyn-salt">${fmt(p.salt100)} g</div>
          <div class="nutr-sub">pro 100 g</div>
        </div>
      </div>
      <div class="qty-row">
        <label>Menge:</label>
        <input type="number" id="qty-input" value="100" min="1" max="9999" step="1" oninput="updateDyn()"/>
        <span>g</span>
      </div>
      <div class="meal-select-row">
        <label>Mahlzeit:</label>
        <select id="meal-select">
          ${MEALS.map(m=>`<option value="${m}">${m}</option>`).join('')}
        </select>
      </div>
      <button class="add-entry-btn" onclick="addEntry()">Zum Tagebuch hinzufügen</button>
    </div>`;
}

function updateDyn() {
  if (!currentProduct) return;
  const qty = parseFloat(document.getElementById('qty-input').value) || 100;
  const f = qty / 100;
  const p = currentProduct;
  document.getElementById('dyn-kcal').textContent = Math.round(p.kcal100 * f) + ' kcal';
  document.getElementById('dyn-protein').textContent = fmt(p.protein100 * f) + ' g';
  document.getElementById('dyn-carbs').textContent = fmt(p.carbs100 * f) + ' g';
  document.getElementById('dyn-fat').textContent = fmt(p.fat100 * f) + ' g';
  document.getElementById('dyn-fiber').textContent = fmt(p.fiber100 * f) + ' g';
  document.getElementById('dyn-salt').textContent = fmt(p.salt100 * f) + ' g';
}

function addEntry() {
  const qty = parseFloat(document.getElementById('qty-input').value) || 100;
  const meal = document.getElementById('meal-select').value;
  const f = qty / 100;
  const p = currentProduct;
  entries.push({
    id: Date.now().toString(),
    date: today(), meal,
    name: p.name, qty,
    kcal: p.kcal100 * f,
    protein: p.protein100 * f,
    carbs: p.carbs100 * f,
    fat: p.fat100 * f,
    fiber: p.fiber100 * f,
  });
  save();
  document.getElementById('product-result').innerHTML = '<div class="status-msg success-msg">✓ Hinzugefügt!</div>';
  document.getElementById('barcode-input').value = '';
  currentProduct = null;
  setTimeout(() => switchTab('today'), 900);
}

function toggleCamera() {
  if (cameraRunning) stopCamera(); else startCamera();
}

function startCamera() {
  document.getElementById('video-wrap').style.display = 'block';
  document.getElementById('scan-placeholder').style.display = 'none';
  document.getElementById('cam-label').textContent = 'Kamera stoppen';
  document.getElementById('cam-icon').textContent = '◼';
  cameraRunning = true;

  if (typeof Quagga === 'undefined') {
    document.getElementById('scan-status').innerHTML = '<div class="status-msg error-msg">Scanner konnte nicht geladen werden. Bitte Barcode manuell eingeben.</div>';
    stopCamera(); return;
  }
  Quagga.init({
    inputStream: { type:'LiveStream', target: document.getElementById('video'), constraints: { facingMode:'environment' } },
    decoder: { readers: ['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader'] },
    locate: true,
  }, err => {
    if (err) { document.getElementById('scan-status').innerHTML = '<div class="status-msg error-msg">Kamerazugriff verweigert. Bitte in den Browser-Einstellungen erlauben.</div>'; stopCamera(); return; }
    Quagga.start();
  });
  let last = '';
  Quagga.onDetected(result => {
    const code = result.codeResult.code;
    if (code && code !== last) {
      last = code;
      document.getElementById('barcode-input').value = code;
      stopCamera();
      lookupBarcode(code);
    }
  });
}

function stopCamera() {
  if (typeof Quagga !== 'undefined') { try { Quagga.stop(); } catch(e) {} }
  document.getElementById('video-wrap').style.display = 'none';
  document.getElementById('scan-placeholder').style.display = 'block';
  document.getElementById('cam-label').textContent = 'Kamera starten';
  document.getElementById('cam-icon').textContent = '▶';
  cameraRunning = false;
}

renderToday();
</script>
</body>
</html>
